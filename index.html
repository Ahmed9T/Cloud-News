<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The latest cloud announcements and product news, aggregated from official RSS feeds."
    />
    <title>Cloud News — Latest Cloud Announcements</title>
    <link rel="preconnect" href="https://aws.amazon.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='.9em' font-size='18'%3E%E2%98%81%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <a class="skip-link" href="#news-grid">Skip to news</a>

    <header class="site-header">
      <div class="container site-header__inner">
        <div class="brand">
          <span class="brand__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none">
              <path
                d="M7 18a4 4 0 0 1-.5-7.97A5.5 5.5 0 0 1 17 9.2 3.8 3.8 0 0 1 16.5 18H7Z"
                fill="currentColor"
                opacity="0.9"
              />
            </svg>
          </span>
          <div class="brand__text">
            <h1 class="brand__title">Cloud News</h1>
            <p class="brand__tagline">Fresh announcements from the cloud, in one place.</p>
          </div>
        </div>

        <div class="last-updated" id="last-updated" hidden>
          <span class="last-updated__dot" aria-hidden="true"></span>
          <span class="last-updated__label">Updated</span>
          <time class="last-updated__value" id="last-updated-value" datetime=""></time>
        </div>
      </div>
    </header>

    <main class="container" id="main">
      <nav class="filters" id="filters" aria-label="Filter news by source" hidden>
        <div class="filters__list" role="tablist" id="filters-list"></div>
        <p class="filters__count" id="filters-count" aria-live="polite"></p>
      </nav>

      <section
        class="news-grid"
        id="news-grid"
        aria-label="Cloud news articles"
        aria-busy="true"
      ></section>

      <div class="status" id="status" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p class="status__text">Loading the latest cloud news…</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p>
          Built as a static dashboard · Data from official cloud RSS feeds ·
          Refreshed automatically via GitHub Actions.
        </p>
        <p class="site-footer__meta" id="footer-count"></p>
      </div>
    </footer>

    <noscript>
      <div class="container">
        <p class="status__text">
          This dashboard needs JavaScript enabled to display the latest news.
        </p>
      </div>
    </noscript>

    <script src="app.js" defer></script>
  </body>
</html>
